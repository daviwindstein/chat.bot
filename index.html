<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha IA Personalizada</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #config { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; margin-top: 20px; }
        #chat-container { display: none; width: 90%; max-width: 500px; background: #1e1e1e; border-radius: 10px; margin-top: 20px; padding: 15px; }
        #messages { height: 300px; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 10px; padding: 10px; }
        input, select, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .bot { color: #00ffcc; margin-bottom: 10px; }
        .user { color: #ffffff; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="config">
        <h2>Criar Personagem</h2>
        <input type="text" id="apiKey" placeholder="Cole sua API Key do Google Gemini aqui">
        <input type="text" id="charName" placeholder="Nome do Personagem">
        <input type="file" id="charPhoto" accept="image/*">
        
        <label>Tipo de Público:</label>
        <select id="targetAudience">
            <option value="kids">Crianças (Feliz/Legal/Confiante)</option>
            <option value="adults">Adultos (Linguagem Inadequada/Livre)</option>
        </select>

        <button onclick="iniciarChat()">Abrir Chat</button>
    </div>

    <div id="chat-container">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img id="displayAvatar" class="avatar" src="" style="display:none;">
            <h3 id="displayTitle"></h3>
        </div>
        <div id="messages"></div>
        <input type="text" id="userInput" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        let chatHistory = [];
        let systemPrompt = "";

        function iniciarChat() {
            const name = document.getElementById('charName').value;
            const audience = document.getElementById('targetAudience').value;
            const photo = document.getElementById('charPhoto').files[0];

            if (audience === "kids") {
                systemPrompt = `Você é ${name}. Responda como um personagem extremamente feliz, legal, confiante e educado. Use emojis, seja amigável e nunca use palavras feias. Foco total em crianças.`;
            } else {
                systemPrompt = `Você é ${name}. Responda como um personagem adulto. Você tem liberdade total de linguagem, pode ser inadequado, usar gírias pesadas, ser safado(a) e provocador(a). Não tenha filtros de civilidade.`;
            }

            if (photo) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('displayAvatar').src = e.target.result;
                    document.getElementById('displayAvatar').style.display = 'block';
                };
                reader.readAsDataURL(photo);
            }

            document.getElementById('displayTitle').innerText = name;
            document.getElementById('config').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
        }

        async function enviarMensagem() {
            const apiKey = document.getElementById('apiKey').value;
            const userInput = document.getElementById('userInput').value;
            if (!userInput || !apiKey) return;

            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div class="user"><b>Você:</b> ${userInput}</div>`;
            document.getElementById('userInput').value = "";

            // Chamada para a API do Google Gemini
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            { role: "user", parts: [{ text: `INSTRUÇÃO DE SISTEMA: ${systemPrompt}` }] },
                            ...chatHistory,
                            { role: "user", parts: [{ text: userInput }] }
                        ],
                        // Ajuste de segurança para permitir o modo adulto
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await response.json();
                const botText = data.candidates[0].content.parts[0].text;

                msgDiv.innerHTML += `<div class="bot"><b>${document.getElementById('charName').value}:</b> ${botText}</div>`;
                chatHistory.push({ role: "user", parts: [{ text: userInput }] });
                chatHistory.push({ role: "model", parts: [{ text: botText }] });
                msgDiv.scrollTop = msgDiv.scrollHeight;

            } catch (error) {
                msgDiv.innerHTML += `<div style="color:red">Erro: Verifique sua chave ou conexão.</div>`;
            }
        }
    </script>
</body>
</html>
